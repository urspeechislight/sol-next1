name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: install
        # `--frozen-lockfile` is enforced once `pnpm-lock.yaml` is committed;
        # skip the flag automatically on the very first CI run.
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi
      - name: svelte-kit sync
        # Generates `.svelte-kit/tsconfig.json`, which the frontend's tsconfig
        # extends. Without this step, `pnpm lint` and `pnpm check` fail.
        run: pnpm --filter frontend exec svelte-kit sync
      - name: format check
        run: pnpm format:check
      - name: lint
        run: pnpm lint
      - name: typecheck
        run: pnpm check
      - name: unit tests
        run: pnpm test
      - name: build
        run: pnpm build

  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install uv
        uses: astral-sh/setup-uv@v4
      - name: sync deps
        run: uv sync --group dev
      - name: ruff check
        run: uv run ruff check src tests .claude
      - name: ruff format check
        run: uv run ruff format --check src tests .claude
      - name: pyright
        run: uv run pyright
      - name: pytest
        run: uv run pytest

  harness-self-test:
    name: harness self-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: astral-sh/setup-uv@v4
      - name: sync deps
        run: uv sync --group dev
      - name: run harness tests
        run: uv run pytest .claude/tests -v

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: [frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: install
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi
      - name: svelte-kit sync
        run: pnpm --filter frontend exec svelte-kit sync
      - name: install playwright
        run: pnpm --filter frontend exec playwright install --with-deps chromium
      - name: e2e
        run: pnpm test:e2e
