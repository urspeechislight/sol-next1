# Declarative policy registry. Mirrors the handlers under .claude/lib/handlers/ for
# documentation, tooling, and future external policy engines (OPA / Cedar). The
# Python handlers are the source of truth for enforcement; this file is the
# reviewable contract.

version: 1

rules:
  # ---- Design system (SSOT/DRY) ----------------------------------------------
  - id: DS-001
    handler: no_raw_colors
    severity: block
    summary: Raw color literals (#hex, rgb, oklch...) only in tokens.css.
    rationale: Single source of truth for color. Theme retuning must be one edit.
    doc: docs/design-system.md#hard-rules

  - id: DS-002
    handler: no_inline_styles
    severity: block
    summary: No inline `style="..."` in .svelte files.
    rationale: Inline styles bypass the design system and twMerge.
    doc: docs/design-system.md#hard-rules

  - id: DS-003
    handler: primitive_usage
    severity: block
    summary: Routes must use design-system primitives, not raw HTML elements.
    rationale: Raw <button>/<input> drift from the rest of the app.
    doc: docs/design-system.md#hard-rules

  - id: DS-004
    handler: variants_only
    severity: block
    summary: Status → palette maps live only in variants.ts.
    rationale: Vocabulary spread across files breaks rebrandability.
    doc: docs/design-system.md#hard-rules

  # ---- Boundaries ------------------------------------------------------------
  - id: BND-001
    handler: import_boundaries
    severity: block
    summary: $lib/design-system/internal is private.
    rationale: Encapsulation — only the design system itself uses internal/.
    doc: docs/quality-standards.md#imports--boundaries

  - id: BND-002
    handler: import_boundaries
    severity: block
    summary: Frontend may not import backend / pipeline Python packages.
    rationale: Frontend talks to backend over HTTP, not in-process.
    doc: docs/quality-standards.md#imports--boundaries

  # ---- Code quality ----------------------------------------------------------
  - id: QUAL-010
    handler: file_size_cap
    severity: warn-300/block-500
    summary: File LOC caps.
    doc: docs/quality-standards.md#size-caps

  - id: QUAL-011
    handler: function_size_cap
    severity: block
    summary: Function LOC cap (80).
    doc: docs/quality-standards.md#size-caps

  - id: QUAL-012
    handler: no_silent_except
    severity: block
    summary: No bare `except:` or `except: pass`.
    doc: docs/quality-standards.md#code-quality

  # ---- Python typing ---------------------------------------------------------
  - id: PY-001
    handler: typed_python
    severity: block
    summary: Public Python functions need return-type annotations.
    doc: docs/quality-standards.md#code-quality

  # ---- Tests -----------------------------------------------------------------
  - id: TEST-001
    handler: test_naming
    severity: block
    summary: Test names follow test_should_<verb>_<object>_<condition>.
    doc: docs/quality-standards.md#tests

  # ---- Security --------------------------------------------------------------
  - id: SEC-001
    handler: secret_scanner
    severity: block
    summary: High-confidence secret patterns blocked at write time.
    doc: docs/quality-standards.md#security

  # ---- Bash safety net -------------------------------------------------------
  - id: BASH-001
    handler: dangerous_bash
    severity: block
    summary: rm -rf at root.
  - id: BASH-002
    handler: dangerous_bash
    severity: block
    summary: git push --force to main/master.
  - id: BASH-003
    handler: dangerous_bash
    severity: block
    summary: git commit/push --no-verify.
  - id: BASH-004
    handler: dangerous_bash
    severity: block
    summary: curl | sh.
  - id: BASH-005
    handler: dangerous_bash
    severity: block
    summary: git reset --hard.

  # ---- Standalone isolation --------------------------------------------------
  - id: ISO-001
    handler: external_refs
    severity: block
    summary: No references to sibling projects (sol-next, pylon, akeyless...).
    doc: docs/foundation.md#standalone-contract

  # ---- Documentation discipline ---------------------------------------------
  - id: DOC-001
    handler: docs_location
    severity: block
    summary: Markdown docs live in docs/ (except root README.md, CLAUDE.md).
    doc: docs/repo-layout.md#documentation
