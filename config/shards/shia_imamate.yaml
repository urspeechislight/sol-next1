# Shia imamate doctrinal concepts.
#
# This registry covers the foundational doctrinal concepts of Imami Shia
# theology — both the five usul al-din (foundations of religion) and the
# imamate-specific doctrines that distinguish Imami Shia from Sunni and
# Zaydi traditions.
#
# [Sources in the corpus:
#  - al-Mufid, Awaʾil al-Maqalat fi al-Madhahib wa al-Mukhtarat (sol_id
#    U8J_JE3V, data/books/shia-theology/) — foundational doctrinal positions.
#  - al-Hilli, al-Bab al-Hadi ʿAshar (sol_id yMuDJtbi, same dir) — the
#    canonical Imami creed manual; its 11th chapter title became the
#    standard reference for Imami doctrine and is used as an introductory
#    text in seminaries to this day.
#  - al-Mufid, al-Nukat al-Iʿtiqadiyya (sol_id vPrlBn1Y) — concise creed.]

# === Five usul al-din (foundations of religion) ==============================
# Imami doctrine adds ʿAdl and Imama to the three Sunni usul. Mu'tazila
# also include ʿAdl. The five-principle scheme is canonical Imami; some
# medieval authorities also list Tabarri / Tawalli as distinct.
shia_usul_al_din:
  - TAWHID # divine unity
  - ADL # divine justice (specifically Imami emphasis;
    #         shared with Mu'tazila)
  - NUBUWWA # prophecy
  - IMAMA # imamate (the distinctive Imami principle)
  - MAAD # resurrection / afterlife

# === Imamate-specific doctrinal concepts =====================================
# These are the technical concepts that constitute the Imami theological
# framework around the Imamate. Each is a distinct doctrinal position with
# substantial classical and modern literature.
shia_imamate_concept:
  - NASS # explicit textual designation of an Imam
    #   (Ghadir Khumm hadith is the paradigm; cf. event
    #   types.NASS for the event itself)
  - ISMA # infallibility; extends to Prophet,
    #   Fatima, and the 12 Imams (the 14 Maʿsumin)
  - GHAYBA # occultation (umbrella; sub-types below)
  - GHAYBA_SUGHRA # minor occultation (260-329 AH);
    #   communication via four sufara' (deputies)
  - GHAYBA_KUBRA # major occultation (329 AH-present);
    #   no formal deputy
  - RAJA # return of certain Imams (and others) to
    #   the world before the Last Day
  - TAQIYYA # protective dissimulation under threat;
    #   permitted (sometimes obligatory) when life or
    #   dignity is at stake
  - WALAYA # allegiance / guardianship of ʿAli and
    #   the Imams; sometimes treated as a usul al-din
    #   alongside the five
  - TAWALLI # affirmative loyalty to Ahl al-Bayt
    #   (companion concept to walaya)
  - BARAA # disavowal of enemies of the Imams;
    #   companion to tawalli
  - BIDA # God's "appearing to change" His decree;
    #   distinctively Imami concept (controversial in
    #   wider Islamic discourse). Note: distinct from
    #   bidʿa (innovation in religion) in `narrator_defect_cause`.
  - ILM_AL_IMAM # the Imam's divinely-imparted
    #   knowledge of all things needed for his function
  - MAHDAWIYYA # eschatological doctrine of al-Mahdi's
    #   reappearance and global justice
  - SHAFAA # intercession; the Imams (and Prophet)
    #   may intercede for believers on Judgment Day
  - WILAYAT_AL_FAQIH # guardianship of the jurist;
    #   modern doctrine (Khomeini) extending walaya
    #   to the senior jurist during ghayba kubra
  - MARJAIYYA # institution of the marja' al-taqlid
    #   (highest jurist whose rulings are followed);
    #   modern Imami practice during ghayba kubra
