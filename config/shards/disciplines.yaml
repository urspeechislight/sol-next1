# Linguistic, philosophical, and natural disciplines.
# Quranic sciences live in shards/quranic.yaml.
#
# [Source: al-Tahanawi, Kashshaf Istilahat al-Funun, vol. 1 introduction
#  pp. 57-118 (sol_id z_iqVsoq_01) — the authoritative classical taxonomy
#  of Islamic sciences. Three groups: العلوم العربية (Arabic linguistic
#  sciences), العلوم الشرعية (religious sciences — modeled by hadith /
#  fiqh / kalam axes elsewhere), and العلوم الحقيقية (rational sciences =
#  philosophy + natural sciences).]

# === Arabic linguistic sciences (Kashshaf vol. 1 pp. 71-82) ==================
linguistic_discipline:
  - NAHW # syntax (Kashshaf p. 77)
  - SARF # morphology (Kashshaf p. 74)
  - BALAGHA # rhetoric (umbrella; subdivided below)
  - ARUD # prosody / metrics (Kashshaf p. 82)
  - QAFIYA # rhyme (Kashshaf p. 82)
  - LUGHA # lexicography (Lisan al-'Arab tradition)
  - FIQH_AL_LUGHA # philology
  - ISHTIQAQ # etymology / derivation
  - ASWAT # phonetics
  - KHATT # orthography / calligraphy
  - INSHA # composition / epistolary art
  # Note: علم القراءة (Quranic recitation / variant readings — Kashshaf p.89)
  # is registered under quranic_science.QIRAAT (shards/quranic.yaml) rather
  # than as a linguistic discipline. While Tahanawi places it under linguistic
  # sciences in his taxonomy, its content is Qur'an-specific and the canonical
  # specialist literature (Ibn al-Jazari, al-Shatibi, al-Dani) treats it as
  # one of the 'ulum al-Qur'an.

# === Sub-disciplines of balagha (Kashshaf pp. 78-81) =========================
balagha_subdiscipline:
  - MAANI # semantics / pragmatics (Kashshaf p. 78)
  - BAYAN # clarity / metaphor / simile (Kashshaf p. 80)
  - BADI # embellishment / verbal beauty (Kashshaf p. 81)

# === Philosophical and rational disciplines (Kashshaf pp. 97-118) ============
philosophical_discipline:
  - MANTIQ # logic (Kashshaf p. 98; formal Aristotelian)
  - FALSAFA # philosophy (general umbrella)
  - ILM_ILAHI # metaphysics / first philosophy (Kashshaf p. 107)
  - ILM_TABII # natural philosophy / physics (Kashshaf p. 109)
  - ILM_RIYADI # mathematics (Kashshaf p. 108)
  - HIKMA # wisdom / philosophy (often used in Shia tradition)
  - ISHRAQ # illuminationist philosophy (Suhrawardi school)
  - HIKMA_MUTAALIYA # transcendent philosophy (Mulla Sadra school)
  - AKHLAQ # ethics (philosophical, distinct from suluk)

# === Natural / mathematical sciences (Kashshaf pp. 110-118) ==================
# Most are minor for our hadith / event / tafsir KG but appear in
# arabic-language-sciences and logic-philosophy categories.
natural_science:
  - TIBB # medicine (Kashshaf p. 110, 118)
  - HANDASA # geometry (Kashshaf p. 112)
  - HAIA # astronomy (Kashshaf p. 115)
  - NUJUM # astrology (Kashshaf p. 110, 119)
  - MIQAT # timekeeping (Kashshaf p. 117)
  - ZIJAT # astronomical tables (Kashshaf p. 117)
  - ADAD # arithmetic (Kashshaf p. 111)
  - MISAHA # surveying (Kashshaf p. 114)
  - MANAZIR # optics (Kashshaf p. 113)
  - KIMIYA # alchemy / chemistry (Kashshaf p. 111)
  - FALAHA # agriculture (Kashshaf p. 111)
  - FIRASA # physiognomy (Kashshaf p. 110)
  - TABIR_AL_RUYA # oneirology (Kashshaf p. 110)
