# Tasawwuf (Sufism) registries.
#
# [Source: al-Qushayri, al-Risala al-Qushayriyya (sol_id CB78uu0F,
#  data/books/ethics-mysticism/) — the foundational Sufi handbook
#  (5th/11th c.) that codified the maqamat / ahwal vocabulary. Page
#  citations refer to its babs (chapter divisions).]
#
# Note: SUFI as a spiritual orientation is in alignment.yaml; this file
# captures tasawwuf-internal structure.

# === Spiritual stations and states (maqamat / ahwal) =========================
# al-Qushayri organizes Sufism around ~50 babs covering stations (acquired)
# and states (granted). He does not systematically distinguish maqam from
# hal — he treats both as the practitioner's inner conditions. The list
# below is the canonical catalog from his bab structure (pp. 168-539).
#
# Classical distinction: MAQAM = a stable station the wayfarer reaches by
# his own striving; HAL = a transient state granted as a gift. Some entries
# below are clearly stations (tawba, zuhd), others clearly states
# (mahabba, shawq) — and some are debated.
maqamat_ahwal:
  # === Foundational stations (early stages) ===
  - TAWBA # repentance (Risala p. 168)
  - MUJAHADA # striving against the ego (p. 177)
  - KHALWA_UZLA # solitude / withdrawal (p. 183)
  - TAQWA # god-consciousness (p. 188)
  - WARA # scrupulousness (p. 194)
  - ZUHD # asceticism (p. 200)
  - SAMT # silence (p. 206)

  # === Affective states (between hope and fear) ===
  - KHAWF # fear of God (p. 212)
  - RAJA # hope (p. 221)
  - HUZN # sacred sadness (p. 230)
  - JU_TARK_SHAHWA # hunger / abstaining from desire (p. 233)

  # === Inner-character stations ===
  - KHUSHU_TAWADUI # humility (p. 238)
  - MUKHALAFAT_NAFS # opposing the lower self (p. 246)
  - QANAA # contentment (p. 257)
  - TAWAKKUL # trust in God (p. 261)
  - SHUKR # gratitude (p. 275)
  - YAQIN # certainty (p. 281)
  - SABR # patience (p. 286)

  # === Vigilance and consent ===
  - MURAQABA # vigilance / inner watchfulness (p. 293)
  - RIDA # acceptance / contentment with God's decree (p. 297)
  - UBUDIYYA # servitude (p. 302)
  - IRADA # sincere aspiration (p. 306)
  - ISTIQAMA # uprightness (p. 311)

  # === Sincerity and truthfulness ===
  - IKHLAS # sincerity (p. 314)
  - SIDQ # truthfulness (p. 318)
  - HAYA # modesty / shame before God (p. 323)
  - HURRIYYA # spiritual freedom (p. 328)

  # === Devotional practices ===
  - DHIKR # remembrance of God (p. 331)
  - DUA # supplication (p. 379)
  - SAMAA # mystical audition / listening to recitation (p. 466)

  # === Character virtues ===
  - FUTUWWA # chivalry / spiritual generosity (p. 337)
  - FIRASA # spiritual insight (p. 343)
  - KHULQ # character (p. 354)
  - JUD_SAKHA # generosity (p. 360)
  - GHIRA # sacred zeal (p. 368)
  - ADAB # proper conduct / etiquette (p. 405)

  # === Vices to avoid (negative-station chapters) ===
  - HASAD # envy (p. 251)
  - GHIBA # backbiting (p. 254)

  # === Advanced spiritual states ===
  - WALAYA # sainthood / friendship with God (p. 374)
  - FAQR # spiritual poverty (p. 388)
  - TASAWWUF_AS_STATE # Sufism itself as a station (p. 399)

  # === Travel, companionship, terminus ===
  - AHKAM_SAFAR # rules of spiritual travel (p. 410)
  - SUHBA # companionship with shaykhs (p. 417)
  - HIFZ_QULUB_MASHAYIKH # preserving the masters' hearts (p. 463)
  - WASIYYA_LIL_MURIDIN # counsel for novices (p. 539)

  # === Gnostic and unitive states ===
  - TAWHID # unification (p. 422; in Sufi sense)
  - MARIFA_BILLAH # gnosis of God (p. 438)
  - MAHABBA # love (of God) (p. 445)
  - SHAWQ # yearning for God (p. 458)

  # === Eschatological and visionary ===
  - AHWAL_KHURUJ_DUNYA # states at death (p. 429)
  - KARAMAT_AWLIYA # saints' miracles (p. 485)
  - RUYA_AL_QAWM # visions of the spiritual people (p. 526)

# === Core Sufi conceptual vocabulary ============================================
# Technical terms used in Sufi discourse. al-Qushayri devotes p. 121 onward to
# explaining these "alfaz tadur bayna hadhihi al-taifa" (terms current among
# this group). The list below is the standard Sufi technical lexicon.
sufi_concept:
  - HAL # transient state granted by God
  - MAQAM # stable station attained by effort
  - WAJD # ecstatic finding
  - WAQT # the present moment as spiritual locus
  - QABD_BAST # contraction / expansion
  - HAYBA_UNS # awe / intimacy
  - FANA # annihilation in God
  - BAQA # subsistence in God (post-fanaʾ)
  - JAMA_FARQ # gathered (in unity) / distinguished
  - SAHW_SUKR # sobriety / spiritual intoxication
  - SIRR # the innermost secret of the heart
  - SIRR_AL_SIRR # the secret of the secret
  - LATIFA # subtle reality
  - RUH # spirit (in Sufi sense)
  - QALB # heart (as spiritual organ)
  - NAFS # ego / lower self (with subtypes below)
  - SILSILA # chain of spiritual transmission
  - IJAZA_SUFIYYA # Sufi license / authorization
  - SULUK # wayfaring / spiritual journey
  - IRSHAD # guidance (by a shaykh)
  - MURID # disciple
  - MURSHID # guide / shaykh
  - QUTB # spiritual axis / pole of the saints
  - ABDAL # substitute saints
  - GHAWTH # succor / supreme spiritual rank
  - WALI # friend of God / saint
  - BARAKA # divine grace channeled through holy persons / places
  - HIMMA # spiritual aspiration
  - DHAWQ # spiritual taste / experiential knowledge
  - KASHF # unveiling / spiritual disclosure
  - MUSHAHADA # witnessing the divine
  - MAHJUB # veiled (from divine reality)

# === Stages of the lower self (nafs) ============================================
# A Quranic-derived progression worked into Sufi anthropology. Cited in
# Q. 12:53, 75:2, 89:27 — the three Quranic states. Later Sufis added
# four more, yielding the classical seven.
nafs_stage:
  - AMMARA # commanding to evil (Q. 12:53)
  - LAWWAMA # self-reproaching (Q. 75:2)
  - MULHAMA # inspired
  - MUTMAINNA # at peace (Q. 89:27)
  - RADIYA # content
  - MARDIYYA # God-pleased
  - KAMILA # perfected

# === Sufi orders (turuq) =========================================================
# Major historical Sufi orders. al-Qushayri predates the formal tariqa
# institution (5th/11th c.); these orders crystallized 6th/12th c. onward.
# This list covers the principal ṭuruq with substantial corpus presence
# and historical influence.
sufi_tariqa:
  - QADIRIYYA # ʿAbd al-Qadir al-Jilani (d. 561/1166)
  - SUHRAWARDIYYA # al-Suhrawardi (d. 632/1234)
  - SHADHILIYYA # Abu al-Hasan al-Shadhili (d. 656/1258)
  - RIFAIYYA # Ahmad al-Rifaʿi (d. 578/1182)
  - NAQSHBANDIYYA # Bahaʾ al-Din Naqshband (d. 791/1389)
  - MAWLAWIYYA # Jalal al-Din Rumi (d. 672/1273)
  - CHISHTIYYA # Muʿin al-Din Chishti (d. 633/1236)
  - KHALWATIYYA
  - BEKTASHIYYA
  - TIJANIYYA # Ahmad al-Tijani (d. 1230/1815)
  - SANUSIYYA
  - IDRISIYYA
  - DARQAWIYYA
  - NIMATULLAHIYYA # Shia-affiliated
  - DHAHABIYYA # Shia-affiliated
  - NURBAKHSHIYYA # Shia-affiliated
  - KUBRAWIYYA # Najm al-Din Kubra (d. 618/1221)
