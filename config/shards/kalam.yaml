# Kalam (theological) registries.
#
# [Sources:
#  - al-Hilli, al-Bab al-Hadi ʿAshar (sol_id yMuDJtbi,
#    data/books/shia-theology/) — the standard Imami Shia introductory
#    kalam textbook (8th/14th c.). Frames Imami theology around the
#    five usul al-din. Page citations refer to its faslchapter divisions.
#  - al-Taftazani, Sharh al-ʿAqaʾid al-Nasafiyya (sol_id pozK-F7D,
#    data/books/sunni-theology/) — the standard Maturidi Sunni kalam
#    creed-commentary (8th/14th c.).
#  - al-Taftazani, Sharh al-Maqasid (5 vols, sol_id juyWaHEe,
#    data/books/sunni-theology/) — comprehensive Sunni kalam.
#  - Standard Muʿtazili al-usul al-khamsa attested across the school's
#    self-presentations (Qadi ʿAbd al-Jabbar's Sharh al-Usul al-Khamsa).]
#
# Note: theological school *names* (Mu'tazili, Ash'ari, Maturidi, etc.)
# live under `theological_school` in alignment.yaml. This file captures
# the shared and tradition-specific *topic* structure of kalam.

# === Imami Shia foundations: see shia_imamate.yaml ===========================
# The Imami five usul al-din are in `shia_usul_al_din` (shia_imamate.yaml)
# and the imamate-specific concepts (nass, isma, ghayba, taqiyya, bada,
# walaya, etc.) are in `shia_imamate_concept` (same shard). Not duplicated
# here.

# === Sunni: the six articles of faith (arkan al-iman) ========================
# From the canonical hadith of Gabriel (Bukhari, Muslim) — the six things
# a believer must affirm. Structurally distinct from the Imami five usul.
sunni_arkan_al_iman:
  - IMAN_BILLAH
  - IMAN_BIL_MALAIKA # angels
  - IMAN_BIL_KUTUB # revealed books
  - IMAN_BIL_RUSUL # messengers
  - IMAN_BIL_YAWM_AKHIR # the Last Day
  - IMAN_BIL_QADAR # divine decree (good and ill)

# === Mu'tazila: the five principles (al-usul al-khamsa) ======================
# The Muʿtazila's self-defining doctrinal scheme, preserved in Qadi ʿAbd
# al-Jabbar's eponymous work. Imami theology shares the first two
# (al-Tawhid, al-ʿAdl) — hence the Twelver Shia self-designation
# "ʿAdliyya" alongside Muʿtazila.
mutazili_usul_khamsa:
  - TAWHID
  - ADL
  - WAD_WA_WAID # promise (of reward) and threat (of punishment)
  - MANZILA_BAYNA_AL_MANZILATAYN # intermediate position
  - AMR_NAHY_KALAMI # commanding good (kalam-side)

# === Recurring kalam topics (cross-tradition) ================================
# Major topic areas debated across Sunni and Shia kalam schools.
kalam_topic:
  # Divine being
  - WUJUD_WAJIB # existence of the Necessary Being
  - SIFAT_THUBUTIYYA # positive (essential / active) attributes
  - SIFAT_SALBIYYA # negative attributes (incomparability)
  - SIFAT_FILIYYA # attributes of action
  - SIFAT_DHATIYYA # attributes of essence
  - DHAT_WA_SIFAT # essence-vs-attributes problem
  - TASHBIH_TANZIH # anthropomorphism vs incomparability
  - TAJSIM_TATIL # corporealism vs negation (heresies in tension)
  # Action and decree
  - JABR_IKHTIYAR # determinism vs free will
  - KASB # Ash'ari "acquisition" of acts
  - QADAR_QADAA # predestination and decree
  - LUTF # divine grace (esp. Imami / Muʿtazili)
  - KHALQ_AL_AFAL # God's creation of human acts
  # Speech and revelation
  - KHALQ_AL_QURAN # createdness of the Quran (mihna controversy)
  - KALAM_NAFSI # God's interior speech (Ash'ari)
  - KALAM_LAFZI # God's expressed speech
  # Eschatology
  - RUYA # beatific vision of God in the Hereafter
  - SHAFAA # intercession
  - WUJUB_AL_MAAD # necessity of resurrection
  - HISAB_THAWAB_IQAB # judgment, reward, punishment
  - JANNA_NAR # Paradise and Hell
  - SIRAT # the bridge over Hell
  - MIZAN # the balance of deeds
  # Prophethood
  - WUJUB_NUBUWWA # necessity of prophethood
  - ISMAT_ANBIYA # prophetic infallibility
  - MUJIZA # miraculous proof of prophethood
  - KARAMA # saintly miracle (vs muʿjiza)
  - KHATM_NUBUWWA # finality of prophethood
  # Imamate (esp. but not only Imami)
  - WUJUB_IMAMA # necessity of the imamate
  - ISMAT_IMAM # infallibility of the imam
  - NASS_AL_IMAMA # designation of the imam
  - GHAYBA # occultation of the Imam (Imami)
  - RAJAA # return of the Imam (Imami)
  - TAQIYYA # pious dissimulation (Imami)
  - WALAYA_KALAMI # devotional and political authority (Imami)
  - BADAA # divine modification of decree (Imami)
  # Faith and major sin
  - KABIRA_KUFR # major sin's relation to disbelief
  - IMAN_AML # does faith include works?
  - ZIYADA_NUQSAN_IMAN # does faith increase / decrease?
  - TAKFIR # declaring someone an unbeliever
  # Justice
  - HUSN_QUBH_AQLI # rational good/bad
  - TAKLIF_MA_LA_YUTAQ # obligation beyond capacity
  - IWAD_AL_ALAM # compensation for suffering

# === Divine attributes — canonical lists =====================================
# The Ashʿari "seven attributes of meaning" (sifat al-maʿani). These are
# the meta-attributes that Sunni Asharism considers ontologically real
# concomitants of the divine essence.
sunni_sifat_al_maani:
  - HAYAT # life
  - ILM # knowledge
  - QUDRA # power
  - IRADA # will
  - SAM # hearing
  - BASAR # sight
  - KALAM # speech

# Imami sifat thubutiyya — al-Hilli enumerates 8 positive attributes
# (al-Bab fasl 2, pp. 31-40). Slightly different ordering and content.
imami_sifat_thubutiyya:
  - QADIR_MUKHTAR # powerful, free-willed (p. 31)
  - ALIM # knowing (p. 34)
  - HAYY # living (p. 35)
  - MURID_KARIH # willing / disliking (p. 36)
  - MUDRIK # perceiving (p. 37)
  - QADIM_AZALI_BAQI # eternal-pre / -post (p. 38)
  - MUTAKALLIM # speaking (p. 38)
  - SADIQ # truthful (p. 40)

# Imami sifat salbiyya — what God is NOT (al-Bab fasl 3, pp. 40-46).
imami_sifat_salbiyya:
  - LAYSA_BI_JISM # not a body or accident (p. 41)
  - LA_FI_MAHALL # not in a place (p. 41)
  - LA_LADHDHA_ALAM # no pleasure or pain (p. 42)
  - LA_YATTAHID # not united with another (p. 43)
  - LAYSA_MAHALL_HAWADITH # not a locus of contingents (p. 43)
  - LA_RUYA # vision impossible (p. 44)
  - LA_SHARIK # no partner (p. 45)
  - GHANI # self-sufficient (p. 46)
  - LA_MAANI_AHWAL # no states or modes (p. 46)

# === Major historical kalam controversies ====================================
# Disputes that historically defined sectarian identity and produced
# distinct theological literatures. Each is a `kalam_topic` upgraded to a
# named historical event/debate.
kalam_controversy:
  - MIHNA # the Abbasid inquisition over khalq al-Quran (218-234 AH)
  - QADAR_DEBATE # debate on free will (early Umayyad period)
  - TAKFIR_AL_KHARIJI # Khariji takfir of major-sinners
  - MURJII_DEBATE # Murjiʿi position on faith and works
  - JAHMI_DEBATE # Jahm b. Safwan's denial of attributes
  - NASS_BAYAA # Imami debate on naṣṣ vs bayʿa as legitimating principle
  - KHILAFA_VS_IMAMA # Sunni khilafa concept vs Imami imama
  - GHADIR_DEBATE # debates over the meaning of Ghadir Khumm
