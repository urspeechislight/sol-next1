  الأثرية: ATHARI
  أهل الحديث: ATHARI
  المرجئة: MURJII
  الجهمية: JAHMI
  القدرية: QADARI
  الجبرية: JABRI
  الحشوية: HASHWI
  الباطنية: BATINI
