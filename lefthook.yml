# Developer-machine git hooks. Defense-in-depth pair to the agent guardrails in .claude/.
# pre-commit runs only on staged files for speed; pre-push runs the full CI matrix.

pre-commit:
  parallel: true
  commands:
    prettier:
      glob: '*.{ts,js,svelte,json,md,yaml,yml,css}'
      run: pnpm prettier --check {staged_files}
    eslint:
      glob: '*.{ts,js,svelte}'
      run: pnpm --filter frontend exec eslint {staged_files} --max-warnings=0
    svelte-check:
      glob: 'src/frontend/**/*.{ts,svelte}'
      run: pnpm --filter frontend check
    ruff-lint:
      glob: '*.py'
      run: uv run ruff check {staged_files}
    ruff-format:
      glob: '*.py'
      run: uv run ruff format --check {staged_files}
    pyright:
      glob: '*.py'
      run: uv run pyright {staged_files}
    harness-self-test:
      glob: '.claude/**/*.py'
      run: uv run pytest .claude/tests -q
    harness-rules:
      # Mirrors the in-session PreToolUse:Write handler chain. Catches
      # SSOT/DRY/size-cap/typed_python/etc. violations at commit time so
      # commits authored from laptop sessions (which bypass the in-session
      # hook) still pass the same gates.
      glob: '*.{py,ts,tsx,js,jsx,svelte,css,md}'
      run: python3 .claude/hooks/lint_staged.py {staged_files}

# pre-push gate is intentionally disabled.
# pnpm run ci fails at pnpm format:check because prettier-plugin-svelte 3.5.1
# throws "getVisitorKeys is not a function" on every .svelte file
# (peer-dep mismatch with Svelte 5; see pnpm install warnings). The
# pre-commit gate (prettier on staged files only + the full handler chain
# via harness-rules) remains active. GitHub Actions CI is the source of
# truth on PR per docs/foundation.md until the prettier-plugin-svelte
# issue is resolved.
# pre-push:
#   commands:
#     full-ci:
#       run: pnpm run ci

commit-msg:
  commands:
    conventional:
      run: |
        head -1 "{1}" | grep -qE '^(feat|fix|chore|docs|refactor|perf|test|build|ci|style|revert)(\(.+\))?(!)?: .+' \
          || (echo "Commit message must follow Conventional Commits (feat: ..., fix: ..., etc.)" && exit 1)
